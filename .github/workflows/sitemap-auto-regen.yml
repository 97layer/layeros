name: sitemap-auto-regen

on:
  schedule:
    - cron: "0 17 * * *" # 02:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen-sitemap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate sitemap
        run: |
          python3 core/scripts/sitemap_regen.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- website/sitemap.xml knowledge/system/system_state.json; then
            echo "No sitemap changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/sitemap.xml knowledge/system/system_state.json
          git commit -m "chore: regenerate sitemap"
          git push
